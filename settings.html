<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعدادات النظام والحسابات - مؤسسة القوافل الخمسة</title>
    
    <!-- مكتبة الأيقونات والخطوط وتصميم تايلوند المتناسق مع بقية النظام الداكن -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght=300;400;600;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-6 space-y-6">

    <!-- القسم الأول: إنشاء حساب مستخدم جديد -->
    <div class="max-w-6xl mx-auto bg-slate-900/60 border border-slate-800/80 rounded-3xl p-6 shadow-xl backdrop-blur-md">
        <div class="flex items-center gap-2 mb-6 border-b border-slate-800 pb-3">
            <i class="fa-solid fa-user-plus text-blue-500 text-xl"></i>
            <h2 class="text-md font-bold text-white">إنشاء حساب مستخدم جديد</h2>
        </div>
        
        <!-- حقول الإدخال المتناسقة مع واجهتك -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
            <div>
                <label class="block text-slate-400 text-xs font-bold mb-2 mr-1">اسم المستخدم</label>
                <input type="text" id="new-username" placeholder="مثال: salah" 
                    class="w-full bg-slate-950 border border-slate-800 rounded-2xl py-3 px-4 text-white placeholder-slate-600 focus:outline-none focus:border-blue-500 transition-all text-sm">
            </div>
            <div>
                <label class="block text-slate-400 text-xs font-bold mb-2 mr-1">كلمة المرور</label>
                <input type="password" id="new-password" placeholder="••••••••" 
                    class="w-full bg-slate-950 border border-slate-800 rounded-2xl py-3 px-4 text-white placeholder-slate-600 focus:outline-none focus:border-blue-500 transition-all text-sm">
            </div>
            <div>
                <label class="block text-slate-400 text-xs font-bold mb-2 mr-1">نوع الصلاحية المبدئية</label>
                <select id="new-role" class="w-full bg-slate-950 border border-slate-800 rounded-2xl py-3 px-4 text-white focus:outline-none focus:border-blue-500 transition-all text-sm">
                    <option value="Super Admin">مدير نظام (Super Admin)</option>
                    <option value="Data Entry">مدخل بيانات (Data Entry)</option>
                </select>
            </div>
            <div>
                <button onclick="addUser()" class="w-full bg-blue-600 hover:bg-blue-500 active:scale-[0.98] text-white font-bold py-3 rounded-2xl transition-all shadow-lg shadow-blue-600/15 flex items-center justify-center gap-2 text-sm">
                    <i class="fa-solid fa-user-plus"></i> إضافة المستخدم
                </button>
            </div>
        </div>
    </div>

    <!-- القسم الثاني: قائمة الحسابات النشطة وصلاحياتها -->
    <div class="max-w-6xl mx-auto bg-slate-900/60 border border-slate-800/80 rounded-3xl p-6 shadow-xl backdrop-blur-md">
        <div class="flex items-center gap-2 mb-6 border-b border-slate-800 pb-3">
            <i class="fa-solid fa-users-gear text-blue-500 text-xl"></i>
            <h2 class="text-md font-bold text-white">قائمة الحسابات النشطة وصلاحياتها</h2>
        </div>

        <!-- جدول الحسابات الذكي -->
        <div class="overflow-x-auto rounded-2xl border border-slate-800">
            <table class="w-full text-right border-collapse">
                <thead>
                    <tr class="bg-slate-950 text-slate-400 text-xs font-bold border-b border-slate-800">
                        <th class="p-4">اسم المستخدم</th>
                        <th class="p-4">نوع الصلاحية</th>
                        <th class="p-4 text-center">صلاحية الإضافة والتعديل</th>
                        <th class="p-4 text-center">صلاحية الحذف والتصفير</th>
                        <th class="p-4 text-center">دخول الإعدادات</th>
                        <th class="p-4 text-center">الإجراء</th>
                    </tr>
                </thead>
                <tbody id="users-table-body" class="text-sm divide-y divide-slate-800/50">
                    <!-- سيتم توليد الأسطر هنا ديناميكياً بواسطة الجافا سكريبت -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- القسم الثالث: إعدادات المنشأة العامة -->
    <div class="max-w-6xl mx-auto bg-slate-900/60 border border-slate-800/80 rounded-3xl p-6 shadow-xl backdrop-blur-md">
        <div class="flex items-center gap-2 mb-6 border-b border-slate-800 pb-3">
            <i class="fa-solid fa-building text-blue-500 text-xl"></i>
            <h2 class="text-md font-bold text-white">إعدادات المنشأة العامة</h2>
        </div>
        
        <div class="flex flex-col md:flex-row items-end gap-4">
            <div class="flex-1">
                <label class="block text-slate-400 text-xs font-bold mb-2 mr-1">اسم المنشأة الرئيسي في النظام</label>
                <input type="text" id="company-name-input" placeholder="مثال: مؤسسة القوافل الخمسة" 
                    class="w-full bg-slate-950 border border-slate-800 rounded-2xl py-3 px-4 text-white placeholder-slate-600 focus:outline-none focus:border-blue-500 transition-all text-sm">
            </div>
            <div>
                <button onclick="saveCompanyName()" class="bg-slate-950 hover:bg-slate-900 border border-slate-800 text-white font-bold py-3 px-8 rounded-2xl transition-all flex items-center justify-center gap-2 text-sm">
                    حفظ اسم المنشأة
                </button>
            </div>
        </div>
    </div>

    <!-- 🌐 كود الربط الذكي والتحكم بالمصفوفة -->
    <script>
        // دالة تحويل الأرقام العربية إلى إنجليزية لمنع المشاكل في كلمات المرور
        function convertArabicNumbers(str) {
            return String(str).replace(/[٠-٩]/g, d => d.charCodeAt(0) - 1632);
        }

        // عند تشغيل الصفحة: جلب وعرض البيانات المخزنة
        document.addEventListener("DOMContentLoaded", function() {
            // 1. تهيئة الحساب الافتراضي إذا لم تكن هناك مصفوفة مستخدمين مسبقاً
            if (!localStorage.getItem('SYSTEM_USERS')) {
                const defaultUsers = [
                    { username: "admin", password: "5555", role: "Super Admin" }
                ];
                localStorage.setItem('SYSTEM_USERS', JSON.stringify(defaultUsers));
            }
            
            // 2. عرض اسم الشركة الحالي في الحقل
            const savedCompanyName = localStorage.getItem('COMPANY_NAME') || "مؤسسة القوافل الخمسة";
            document.getElementById('company-name-input').value = savedCompanyName;

            // 3. بناء وعرض جدول المستخدمين
            renderUsersTable();
        });

        // دالة بناء وتحديث جدول المستخدمين ديناميكياً بناءً على الذاكرة المحلية
        function renderUsersTable() {
            const users = JSON.parse(localStorage.getItem('SYSTEM_USERS')) || [];
            const tbody = document.getElementById('users-table-body');
            tbody.innerHTML = ''; // مسح الجدول الحالي لإعادة بنائه

            users.forEach((user, index) => {
                const isSuperAdmin = user.role === "Super Admin";
                
                // تحديد شكل ولون شارة (Badge) الصلاحية بناء على نوعها لتطابق صورتك
                const roleBadge = isSuperAdmin 
                    ? `<span class="bg-rose-500/10 text-rose-400 border border-rose-500/20 text-xs px-2.5 py-1 rounded-full font-bold">مدير نظام (Super Admin)</span>`
                    : `<span class="bg-amber-500/10 text-amber-400 border border-amber-500/20 text-xs px-2.5 py-1 rounded-full font-bold">مدخل بيانات (Data Entry)</span>`;

                // بناء السطر بالكامل مع مربعات الصلاحيات (Checkboxes) التفاعلية
                const row = document.createElement('tr');
                row.className = "hover:bg-slate-900/30 transition-all";
                row.innerHTML = `
                    <td class="p-4 font-semibold text-white">${user.username}</td>
                    <td class="p-4">${roleBadge}</td>
                    <td class="p-4 text-center">
                        <input type="checkbox" ${isSuperAdmin ? 'checked disabled class="accent-slate-600"' : 'checked class="w-4 h-4 accent-blue-600"'}>
                    </td>
                    <td class="p-4 text-center">
                        <input type="checkbox" ${isSuperAdmin ? 'checked disabled class="accent-slate-600"' : 'class="w-4 h-4 accent-blue-600"'}>
                    </td>
                    <td class="p-4 text-center">
                        <input type="checkbox" ${isSuperAdmin ? 'checked disabled class="accent-slate-600"' : 'class="w-4 h-4 accent-blue-600"'}>
                    </td>
                    <td class="p-4 text-center">
                        ${user.username.toLowerCase() === 'admin' 
                            ? `<span class="text-xs text-slate-500 italic font-medium">غير قابل للحذف</span>` 
                            : `<button onclick="deleteUser(${index})" class="bg-rose-500/10 hover:bg-rose-500/20 text-rose-400 border border-rose-500/20 text-xs px-3 py-1 rounded-xl transition-all">حذف</button>`
                        }
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        // دالة إضافة مستخدم جديد وربطه مع قاعدة البيانات المحلية
        function addUser() {
            const usernameField = document.getElementById('new-username');
            const passwordField = document.getElementById('new-password');
            const roleField = document.getElementById('new-role');

            const username = usernameField.value.trim().toLowerCase();
            let password = passwordField.value.trim();
            password = convertArabicNumbers(password); // حماية وتصحيح الأرقام المكتوبة
            const role = roleField.value;

            if (!username || !password) {
                alert("⚠️ الرجاء كتابة اسم المستخدم وكلمة المرور أولاً!");
                return;
            }

            let users = JSON.parse(localStorage.getItem('SYSTEM_USERS')) || [];

            // التحقق من عدم تكرار الحساب
            if (users.some(u => u.username.toLowerCase() === username)) {
                alert("⚠️ اسم المستخدم هذا مسجل بالفعل في النظام!");
                return;
            }

            // إضافة الحساب الجديد إلى المصفوفة المشتركة مع صفحة الـ login
            users.push({ username, password, role });
            localStorage.setItem('SYSTEM_USERS', JSON.stringify(users));

            // تفريغ الحقول وتحديث الجدول فوراً
            usernameField.value = '';
            passwordField.value = '';
            renderUsersTable();

            alert(`✅ تم إضافة الحساب (${username}) بنجاح! يمكنه الآن التوجه لصفحة تسجيل الدخول والولوج للنظام.`);
        }

        // دالة حذف حساب من النظام
        function deleteUser(index) {
            let users = JSON.parse(localStorage.getItem('SYSTEM_USERS')) || [];
            const deletedName = users[index].username;
            
            if (confirm(`هل أنت متأكد من حذف حساب المستخدم (${deletedName}) نهائياً؟`)) {
                users.splice(index, 1);
                localStorage.setItem('SYSTEM_USERS', JSON.stringify(users));
                renderUsersTable();
            }
        }

        // دالة حفظ اسم المنشأة وتعميمه على النظام وصفحة الدخول
        function saveCompanyName() {
            const companyName = document.getElementById('company-name-input').value.trim();
            if (!companyName) {
                alert("⚠️ الرجاء إدخال اسم المنشأة!");
                return;
            }
            localStorage.setItem('COMPANY_NAME', companyName);
            alert("✅ تم حفظ وتحديث اسم المنشأة بنجاح في جميع صفحات النظام!");
        }
    </script>
</body>
</html>
