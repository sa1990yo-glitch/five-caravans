<!-- الصندوق الخاص بجدول إدارة المستخدمين الحاليين -->
<div class="bg-white rounded-2xl shadow-sm border border-slate-200/60 overflow-hidden mb-8">
    <div class="p-5 border-b border-slate-100 bg-slate-50/50">
        <h3 class="font-bold text-slate-800 text-sm flex items-center gap-2">
            <i class="fa-solid fa-users-gear text-slate-700"></i> قائمة الحسابات النشطة وصلاحياتها
        </h3>
    </div>
    <div class="overflow-x-auto">
        <table class="w-full text-center border-collapse text-xs">
            <thead>
                <tr class="bg-slate-900 text-white font-bold">
                    <th class="p-4 text-right">اسم المستخدم</th>
                    <th class="p-4">نوع الصلاحية المبدئية</th>
                    <th class="p-4">صلاحية الإضافة والتعديل</th>
                    <th class="p-4">صلاحية الحذف والتصفير</th>
                    <th class="p-4">دخول الإعدادات</th>
                    <th class="p-4">الإجراء</th>
                </tr>
            </thead>
            <tbody id="users-list-tbody" class="divide-y divide-slate-100 text-slate-600 font-semibold font-sans">
                <!-- سيتم رندرة المستخدمين مع مربعات الاختيار التفاعلية هنا -->
            </tbody>
        </table>
    </div>
</div>

<script>
    // التحقق الأمني من تسجيل الدخول الفعلي
    if (localStorage.getItem('isLoggedIn') !== 'true') {
        window.location.href = "login.html";
    }

    // التحقق من أن المستخدم الحالي هو "Admin"
    const currentUserRole = localStorage.getItem('currentUserRole') || 'admin';
    if (currentUserRole !== 'admin') {
        alert("⚠️ عذراً، لا تمتلك صلاحية دخول صفحة الإعدادات والمستخدمين.");
        window.location.href = "index.html";
    }

    document.addEventListener("DOMContentLoaded", function() {
        const companyName = localStorage.getItem('COMPANY_NAME') || "مؤسسة القوافل الخمسة";
        document.getElementById('company-name').value = companyName;
        document.getElementById('sidebar-brand-name').innerText = companyName;

        // رندرة الجدول التفاعلي
        renderUsersTable();
    });

    // رندرة جدول المستخدمين بمربعات اختيار تفاعلية (Checkboxes)
    function renderUsersTable() {
        const tbody = document.getElementById('users-list-tbody');
        let users = JSON.parse(localStorage.getItem('system_users')) || [];
        
        if (users.length === 0) {
            users = [
                { 
                    username: "admin", 
                    password: "123", 
                    role: "admin",
                    canEdit: true,
                    canDelete: true,
                    canSettings: true
                }
            ];
            localStorage.setItem('system_users', JSON.stringify(users));
        }

        tbody.innerHTML = '';
        users.forEach((user, index) => {
            // تعيين القيم الافتراضية للصلاحيات الفردية إن لم تكن موجودة مسبقاً
            if (user.canEdit === undefined) user.canEdit = (user.role === 'admin' || user.role === 'editor');
            if (user.canDelete === undefined) user.canDelete = (user.role === 'admin');
            if (user.canSettings === undefined) user.canSettings = (user.role === 'admin');

            let roleText = "";
            let roleColor = "";

            if (user.role === 'admin') {
                roleText = "مدير نظام (Super Admin)";
                roleColor = "text-rose-600 bg-rose-50 border-rose-200";
            } else if (user.role === 'editor') {
                roleText = "مدخل بيانات (Data Entry)";
                roleColor = "text-amber-600 bg-amber-50 border-amber-200";
            } else {
                roleText = "مستعرض / محاسب (Viewer)";
                roleColor = "text-slate-600 bg-slate-100 border-slate-200";
            }

            // حماية حساب الـ admin الرئيسي بحيث تظل مربعاته مفعّلة وغير قابلة للتعديل لمنع قفل النظام بالخطأ
            const isAdminPrimary = user.username === 'admin';

            tbody.innerHTML += `
                <tr class="hover:bg-slate-50/80 transition-all">
                    <td class="p-4 text-right font-bold text-slate-800">${user.username}</td>
                    <td class="p-4">
                        <span class="px-2.5 py-1 rounded-full border ${roleColor} font-bold text-[10px]">${roleText}</span>
                    </td>
                    
                    <!-- مربع صلاحية الإضافة والتعديل -->
                    <td class="p-4">
                        <input type="checkbox" 
                               ${user.canEdit ? 'checked' : ''} 
                               ${isAdminPrimary ? 'disabled' : ''} 
                               onchange="togglePermission('${user.username}', 'canEdit', this.checked)"
                               class="w-4 h-4 text-blue-600 bg-slate-100 border-slate-300 rounded focus:ring-blue-500 cursor-pointer disabled:opacity-50">
                    </td>

                    <!-- مربع صلاحية الحذف والتصفير -->
                    <td class="p-4">
                        <input type="checkbox" 
                               ${user.canDelete ? 'checked' : ''} 
                               ${isAdminPrimary ? 'disabled' : ''} 
                               onchange="togglePermission('${user.username}', 'canDelete', this.checked)"
                               class="w-4 h-4 text-blue-600 bg-slate-100 border-slate-300 rounded focus:ring-blue-500 cursor-pointer disabled:opacity-50">
                    </td>

                    <!-- مربع صلاحية دخول الإعدادات -->
                    <td class="p-4">
                        <input type="checkbox" 
                               ${user.canSettings ? 'checked' : ''} 
                               ${isAdminPrimary ? 'disabled' : ''} 
                               onchange="togglePermission('${user.username}', 'canSettings', this.checked)"
                               class="w-4 h-4 text-blue-600 bg-slate-100 border-slate-300 rounded focus:ring-blue-500 cursor-pointer disabled:opacity-50">
                    </td>

                    <td class="p-4">
                        ${isAdminPrimary 
                            ? `<span class="text-slate-400 italic text-[11px]">غير قابل للحذف</span>`
                            : `<button onclick="deleteUser('${user.username}')" class="bg-rose-50 text-rose-600 hover:bg-rose-600 hover:text-white px-3 py-1.5 rounded-xl font-bold transition-all text-[11px]">حذف المستخدم</button>`
                        }
                    </td>
                </tr>
            `;
        });
    }

    // دالة تغيير الصلاحيات الفردية وحفظها فوراً عند الضغط على المربع
    function togglePermission(username, permissionType, isChecked) {
        let users = JSON.parse(localStorage.getItem('system_users')) || [];
        const userIndex = users.findIndex(u => u.username.toLowerCase() === username.toLowerCase());

        if (userIndex !== -1) {
            users[userIndex][permissionType] = isChecked;
            localStorage.setItem('system_users', JSON.stringify(users));
            
            // إشعار صغير وناعم للتأكيد بدون تعطيل تجربة المستخدم
            console.log(`تم تحديث صلاحية (${permissionType}) للمستخدم (${username}) إلى: ${isChecked}`);
        }
    }

    // إضافة مستخدم جديد وحفظه
    function handleCreateUser(e) {
        e.preventDefault();
        const username = document.getElementById('new-username').value.trim().toLowerCase();
        const password = document.getElementById('new-password').value.trim();
        const role = document.getElementById('new-user-role').value;

        if (!username || !password) return;

        let users = JSON.parse(localStorage.getItem('system_users')) || [];

        const isExists = users.some(u => u.username.toLowerCase() === username);
        if (isExists) {
            alert("⚠️ اسم المستخدم هذا مسجل مسبقاً!");
            return;
        }

        // إسناد الصلاحيات المبدئية عند الإنشاء بناءً على الدور المحدد
        const canEdit = (role === 'admin' || role === 'editor');
        const canDelete = (role === 'admin');
        const canSettings = (role === 'admin');

        users.push({ username, password, role, canEdit, canDelete, canSettings });
        localStorage.setItem('system_users', JSON.stringify(users));

        renderUsersTable();
        document.getElementById('user-creation-form').reset();
    }

    // حذف مستخدم
    function deleteUser(username) {
        const confirmDelete = confirm(`⚠️ هل أنت متأكد من رغبتك في حذف حساب المستخدم (${username}) نهائياً؟`);
        if (!confirmDelete) return;

        let users = JSON.parse(localStorage.getItem('system_users')) || [];
        users = users.filter(u => u.username.toLowerCase() !== username.toLowerCase());
        localStorage.setItem('system_users', JSON.stringify(users));

        renderUsersTable();
    }
</script>
