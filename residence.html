<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مؤسسة القوافل الخمسة - سجل الموظفين</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght=300;400;600;700&display=swap');
        body { font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex">

    <div class="w-72 bg-slate-950 text-white flex flex-col min-h-screen sticky top-0 p-4 shadow-xl z-20">
        <div class="flex items-center gap-3 px-2 py-4 border-b border-slate-800 mb-6">
            <div class="text-2xl text-blue-500">🚚</div>
            <div>
                <h1 class="font-bold text-base leading-tight">القوافل الخمسة</h1>
                <p class="text-xs text-slate-400">للخدمات اللوجستية</p>
            </div>
        </div>
        
        <nav class="flex-1 flex flex-col gap-1.5">
            <a href="index.html" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-900 hover:text-white transition-all">
                <i class="fa-solid fa-chart-line w-5 text-center"></i> لوحة التحكم العامة
            </a>
            <a href="residence.html" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold bg-blue-600 text-white shadow-lg shadow-blue-600/20 transition-all">
                <i class="fa-solid fa-users w-5 text-center"></i> سجل الموظفين والسائقين
            </a>
            <a href="loans.html" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-900 hover:text-white transition-all">
                <i class="fa-solid fa-sack-dollar w-5 text-center"></i> سجلات السُّلف المالية
            </a>
            <a href="penalties.html" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-900 hover:text-white transition-all">
                <i class="fa-solid fa-scale-balanced w-5 text-center"></i> الجزاءات والخصومات
            </a>
            <a href="leaves.html" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-900 hover:text-white transition-all">
                <i class="fa-solid fa-calendar-days w-5 text-center"></i> إدارة الإجازات
            </a>
        </nav>
    </div>

    <div class="flex-1 p-8 overflow-x-hidden">
        
        <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200/60 mb-8 flex flex-col md:flex-row items-center justify-between gap-4">
            <div>
                <h2 class="text-2xl font-bold text-slate-800">سجل الموظفين والسائقين الأساسي</h2>
                <p class="text-slate-500 text-sm mt-1">قاعدة البيانات المركزية لإدارة وتتبع بيانات الموظفين، السائقين، والوظائف داخل المؤسسة.</p>
            </div>
            
            <div class="flex items-center gap-3">
                <label class="bg-slate-800 hover:bg-slate-700 text-white font-bold px-5 py-2.5 rounded-xl text-sm shadow-md transition-all flex items-center gap-2 cursor-pointer">
                    <i class="fa-solid fa-file-import text-base"></i> استيراد من إكسل
                    <input type="file" id="excel-import-emp" accept=".xlsx, .xls" class="hidden" onchange="importEmpDataFromExcel(event)">
                </label>

                <button onclick="exportEmpDataToExcel()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-5 py-2.5 rounded-xl text-sm shadow-md transition-all flex items-center gap-2">
                    <i class="fa-solid fa-file-excel text-base"></i> تصدير إلى إكسل
                </button>
            </div>
        </div>

        <div id="emp-form-section" class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200/60 mb-8">
            <div class="flex items-center justify-between mb-6 border-b pb-3 border-slate-100 flex-wrap gap-4">
                <div class="flex items-center gap-2 text-blue-600 font-bold">
                    <i class="fa-solid fa-user-plus text-lg"></i>
                    <h3>إضافة / تعديل بيانات موظف</h3>
                </div>
                <div class="relative w-full sm:w-96">
                    <span class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-blue-500">
                        <i class="fa-solid fa-magnifying-glass text-sm"></i>
                    </span>
                    <input type="text" id="quick-search-emp" oninput="handleEmpSearch()" placeholder="ابحث باسم الموظف للتعديل الفوري..." class="w-full pl-4 pr-9 py-2.5 bg-blue-50/50 border border-blue-200 rounded-xl text-xs focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 font-bold text-slate-700 placeholder-blue-400">
                    <div id="search-dropdown-emp" class="absolute left-0 right-0 mt-2 bg-white border border-slate-200 rounded-xl shadow-xl z-50 max-h-60 overflow-y-auto hidden"></div>
                </div>
            </div>
            
            <form id="emp-form" class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-2">اسم الموظف الكامل</label>
                    <input type="text" id="emp-name" placeholder="أدخل اسم الموظف..." class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs focus:outline-none focus:border-blue-500 font-semibold" required>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-2">المسمى الوظيفي</label>
                    <select id="emp-role" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs font-semibold focus:outline-none focus:border-blue-500 cursor-pointer">
                        <option value="سائق دينا">سائق دينا 🚚</option>
                        <option value="سائق تريلة">سائق تريلة 🚛</option>
                        <option value="مندوب توصيل">مندوب توصيل 📦</option>
                        <option value="إداري">إداري 💼</option>
                        <option value="محاسب">محاسب 🧮</option>
                        <option value="أخرى">أخرى</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-2">رقم الجوال</label>
                    <input type="text" id="emp-phone" placeholder="05xxxxxxxx" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs font-semibold focus:outline-none focus:border-blue-500">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-2">الجنسية</label>
                    <input type="text" id="emp-nationality" placeholder="أدخل الجنسية..." class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs font-semibold focus:outline-none focus:border-blue-500">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-2">الراتب الأساسي (ريال)</label>
                    <input type="number" id="emp-salary" placeholder="0.00" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs font-semibold focus:outline-none focus:border-blue-500" required>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-2">تاريخ مباشرة العمل</label>
                    <input type="date" id="emp-start-date" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs font-semibold focus:outline-none focus:border-blue-500">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-2">حالة الموظف</label>
                    <select id="emp-status" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs font-semibold focus:outline-none focus:border-blue-500 cursor-pointer">
                        <option value="على رأس العمل">على رأس العمل 🟢</option>
                        <option value="في إجازة">في إجازة
