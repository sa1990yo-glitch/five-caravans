<div id="employees-section" class="p-6 font-almarai">
  
  <div class="mb-8 flex flex-col md:flex-row justify-between items-start md:items-center bg-white p-6 rounded-2xl shadow-sm border border-gray-100 gap-4">
    <div>
      <h1 class="text-3xl font-bold text-[#0c2d6e] mb-2">سجلات الموظفين والسائقين</h1>
      <p class="text-gray-500 text-sm">إدخال وإدارة ملفات الموظفين وتحديث بياناتهم في النظام المركزي.</p>
    </div>
    <div>
      <span class="text-xs bg-blue-100 text-[#0c2d6e] font-bold px-3 py-1.5 rounded-full">إجمالي المسجلين: <span id="emp-count-badge">0</span> موظف</span>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
    
    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 lg:col-span-1 h-fit">
      <div class="flex items-center gap-2 mb-4 border-b border-gray-100 pb-3">
        <span class="text-xl">👤</span>
        <h3 class="text-lg font-bold text-[#0c2d6e]">بطاقة إدخال موظف</h3>
      </div>
      
      <form id="employee-input-form" class="space-y-4">
        <div>
          <label class="block text-xs font-bold text-gray-600 mb-1">اسم الموظف الثلاثي</label>
          <input type="text" id="emp-fullname" required placeholder="مثال: محمد عبد الله أحمد"
                 class="w-full px-3 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#0c2d6e] focus:border-[#0c2d6e] outline-none text-sm text-right">
        </div>
        
        <div>
          <label class="block text-xs font-bold text-gray-600 mb-1">رقم الإقامة / الهوية</label>
          <input type="number" id="emp-id-number" required placeholder="2xxxxxxxx"
                 class="w-full px-3 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#0c2d6e] focus:border-[#0c2d6e] outline-none text-sm text-right">
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-bold text-gray-600 mb-1">المسمى الوظيفي</label>
            <select id="emp-job" class="w-full px-3 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#0c2d6e] outline-none text-sm bg-white text-right">
              <option value="سائق شاحنة">سائق شاحنة</option>
              <option value="سائق دينا">سائق دينا</option>
              <option value="إداري">إداري</option>
              <option value="محاسب">محاسب</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-bold text-gray-600 mb-1">رقم الجوال</label>
            <input type="text" id="emp-phone" placeholder="05xxxxxxxx"
                   class="w-full px-3 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#0c2d6e] outline-none text-sm text-right">
          </div>
        </div>

        <button type="submit" class="w-full bg-[#0c2d6e] hover:bg-[#092252] text-white font-bold py-2.5 px-4 rounded-xl text-sm transition-all shadow-sm transform active:scale-95">
          إضافة الموظف للسجلات 🚀
        </button>
      </form>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 lg:col-span-2">
      <div class="flex justify-between items-center mb-4 border-b border-gray-100 pb-3">
        <div class="flex items-center gap-2">
          <span class="text-xl">📋</span>
          <h3 class="text-lg font-bold text-gray-800">قاعدة بيانات الموظفين النشطة</h3>
        </div>
        <button onclick="clearEmployeesData()" class="text-xs text-red-500 hover:text-red-700 font-bold transition-colors">مسح كافة الموظفين</button>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-right border-collapse">
          <thead>
            <tr class="border-b border-gray-200 text-gray-400 text-xs font-bold pb-3">
              <th class="pb-3 text-right">الاسم</th>
              <th class="pb-3 text-right">رقم الإقامة</th>
              <th class="pb-3 text-right">الوظيفة</th>
              <th class="pb-3 text-right">الجوال</th>
              <th class="pb-3 text-center">إجراءات</th>
            </tr>
          </thead>
          <tbody id="employees-live-table" class="text-gray-600 text-xs divide-y divide-gray-50">
            </tbody>
        </table>
      </div>
    </div>

  </div>
</div>
