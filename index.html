<div class="p-6 font-almarai">
  
  <div class="mb-8 flex justify-between items-center bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
    <div>
      <h1 class="text-3xl font-bold text-[#0c2d6e] mb-2">لوحة التحكم العامة</h1>
      <p class="text-gray-500 text-sm">نظام الشركات الكبرى لإدارة الإدخال والبيانات الحية.</p>
    </div>
    <div class="text-left">
      <span class="text-xs bg-blue-100 text-[#0c2d6e] font-bold px-3 py-1.5 rounded-full">الوضع المتقدم: متصل ⚡</span>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
    
    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 lg:col-span-1">
      <div class="flex items-center gap-2 mb-4 border-b border-gray-100 pb-3">
        <span class="text-xl">📥</span>
        <h3 class="text-lg font-bold text-[#0c2d6e]">شاشة إدخال الحركات والطلبات</h3>
      </div>
      
      <form id="dashboard-input-form" class="space-y-4">
        <div>
          <label class="block text-xs font-bold text-gray-600 mb-1">اسم الموظف / السائق</label>
          <input type="text" id="dashboard-emp-name" required placeholder="مثال: أحمد ناصر علي"
                 class="w-full px-3 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#0c2d6e] outline-none text-sm">
        </div>
        
        <div>
          <label class="block text-xs font-bold text-gray-600 mb-1">نوع الإجراء / الإدخال</label>
          <select id="dashboard-action-type" class="w-full px-3 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#0c2d6e] outline-none text-sm bg-white">
            <option value="طلب سُلفة مالية">💰 طلب سُلفة مالية</option>
            <option value="تحديث مهنة بقوى">📄 تحديث مهنة بقوى</option>
            <option value="تجديد رخصة قيادة">🪪 تجديد رخصة قيادة</option>
            <option value="إجازة سنوية">📅 طلب إجازة سنوية</option>
          </select>
        </div>

        <div>
          <label class="block text-xs font-bold text-gray-600 mb-1">حالة الطلب الفورية</label>
          <select id="dashboard-status" class="w-full px-3 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#0c2d6e] outline-none text-sm bg-white">
            <option value="تحت المراجعة">⏳ تحت المراجعة</option>
            <option value="تمت الموافقة">✅ تمت الموافقة</option>
            <option value="منتهية / مرفوضة">❌ مرفوضة / منتهية</option>
          </select>
        </div>

        <button type="submit" class="w-full bg-[#0c2d6e] hover:bg-[#092252] text-white font-bold py-2 px-4 rounded-xl text-sm transition-all shadow-sm">
          ترحيل البيانات إلى جدول العرض 🚀
        </button>
      </form>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 lg:col-span-2">
      <div class="flex justify-between items-center mb-4 border-b border-gray-100 pb-3">
        <div class="flex items-center gap-2">
          <span class="text-xl">🖥️</span>
          <h3 class="text-lg font-bold text-gray-800">شاشة العرض المباشر للعمليات</h3>
        </div>
        <button onclick="clearDashboardData()" class="text-xs text-red-500 hover:underline">مسح السجل بالكامل</button>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-right border-collapse">
          <thead>
            <tr class="border-b border-gray-200 text-gray-400 text-xs font-bold uppercase tracking-wider">
              <th class="pb-3">الموظف</th>
              <th class="pb-3">نوع الطلب / الإجراء</th>
              <th class="pb-3">التاريخ والوقت</th>
              <th class="pb-3">الحالة للنظام</th>
            </tr>
          </thead>
          <tbody id="dashboard-live-table" class="text-gray-600 text-xs divide-y divide-gray-50">
            </tbody>
        </table>
      </div>
    </div>

  </div>
</div>
