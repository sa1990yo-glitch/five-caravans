<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم العامة - القوافل الخمسة</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Cairo', sans-serif; }
  </style>
</head>
<body class="bg-slate-100 min-h-screen flex">

  <div class="w-72 bg-slate-900 text-white flex flex-col min-h-screen sticky top-0 p-4 shadow-xl z-20">
    <div class="flex items-center gap-3 px-2 py-4 border-b border-slate-800 mb-6">
      <div class="text-2xl">🚚</div>
      <div>
        <h1 class="font-bold text-lg leading-tight">القوافل الخمسة</h1>
        <p class="text-xs text-slate-400">للخدمات اللوجستية</p>
      </div>
    </div>
    
    <nav class="flex-1 flex flex-col gap-2">
      <a href="index.html" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold bg-blue-600 text-white shadow-lg shadow-blue-600/20 transition-all">
        <span>📊</span> لوحة التحكم العامة
      </a>
      <a href="residence.html" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold text-slate-400 hover:bg-slate-800 hover:text-white transition-all">
        <span>👥</span> سجلات الموظفين والإقامات
      </a>
      <a href="visas.html" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold text-slate-400 hover:bg-slate-800 hover:text-white transition-all">
        <span>📄</span> طلبات التعديل (قوى)
      </a>
      <a href="loans.html" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold text-slate-400 hover:bg-slate-800 hover:text-white transition-all">
        <span>💰</span> سجلات السُّلف المالية
      </a>
    </nav>
  </div>

  <div class="flex-1 p-8 overflow-x-hidden">
    <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200/60 mb-8 flex items-center justify-between">
      <div>
        <h2 class="text-2xl font-bold text-slate-800">لوحة التحكم العامة</h2>
        <p class="text-slate-500 text-sm mt-1">متابعة الحركات اليومية والطلبات المباشرة بالمنشأة.</p>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200/60 md:col-span-1">
        <div class="flex items-center gap-2 text-blue-600 font-bold mb-4">
          <span>📝</span>
          <h3>شاشة إدخال الحركات</h3>
        </div>
        <form id="dashboard-input-form" class="flex flex-col gap-4">
          <div>
            <label class="block text-xs font-bold text-slate-600 mb-2">اسم الموظف / السائق</label>
            <input type="text" id="dashboard-emp-name" placeholder="أحمد ناصر" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-blue-500 font-medium transition-all" required>
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-600 mb-2">نوع الإجراء</label>
            <select id="dashboard-action-type" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-blue-500 font-medium transition-all">
              <option value="💰 طلب سلفة مالية">💰 طلب سلفة مالية</option>
              <option value="🆔 تجديد إقامة">🆔 تجديد إقامة</option>
              <option value="🚗 تأمين مركبة">🚗 تأمين مركبة</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-600 mb-2">الحالة</label>
            <select id="dashboard-status" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-blue-500 font-medium transition-all">
              <option value="تحت المراجعة">⏳ تحت المراجعة</option>
              <option value="تمت الموافقة">✅ تمت الموافقة</option>
            </select>
          </div>
          <button type="submit" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-2.5 rounded-xl text-sm transition-all">
            ترحيل البيانات وحفظها 🚀
          </button>
        </form>
      </div>

      <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200/60 md:col-span-2">
        <div class="flex items-center gap-2 text-slate-800 font-bold mb-4">
          <span>🖥️</span>
          <h3>شاشة العرض المباشر</h3>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-right text-sm">
            <thead>
              <tr class="bg-slate-100 text-slate-700 font-bold border-b border-slate-200">
                <th class="p-3">الموظف</th>
                <th class="p-3">الإجراء</th>
                <th class="p-3">الحالة</th>
                <th class="p-3">العمليات</th>
              </tr>
            </thead>
            <tbody id="dashboard-table-body" class="divide-y divide-slate-100">
              </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      renderDashboardTable();
      const inputForm = document.getElementById("dashboard-input-form");
      if (inputForm) {
        inputForm.addEventListener("submit", function (e) {
          e.preventDefault();
          const empName = document.getElementById("dashboard-emp-name").value.trim();
          const actionType = document.getElementById("dashboard-action-type").value;
          const status = document.getElementById("dashboard-status").value;

          const newRecord = {
            id: Date.now(),
            name: empName,
            type: actionType,
            status: status
          };

          let records = JSON.parse(localStorage.getItem("dashboard_records")) || [];
          records.unshift(newRecord);
          localStorage.setItem("dashboard_records", JSON.stringify(records));
          renderDashboardTable();
          inputForm.reset();
        });
      }
    });

    function renderDashboardTable() {
      const tableBody = document.getElementById("dashboard-table-body");
      if (!tableBody) return;
      const records = JSON.parse(localStorage.getItem("dashboard_records")) || [];
      if (records.length === 0) {
        tableBody.innerHTML = `<tr><td colspan="4" class="p-4 text-center text-slate-400">لا توجد حركات مسجلة.</td></tr>`;
        return;
      }
      tableBody.innerHTML = "";
      records.forEach(r => {
        tableBody.innerHTML += `
          <tr class="border-b border-slate-100 hover:bg-slate-50">
            <td class="p-3 font-bold text-slate-800">${r.name}</td>
            <td class="p-3 text-slate-600">${r.type}</td>
            <td class="p-3"><span class="px-2 py-1 rounded-md text-xs font-bold ${r.status === 'تمت الموافقة' ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'}">${r.status}</span></td>
            <td class="p-3"><button onclick="deleteDashboardRecord(${r.id})" class="text-red-500 hover:underline text-xs font-bold">حذف</button></td>
          </tr>`;
      });
    }

    function deleteDashboardRecord(id) {
      if (confirm("هل تريد حذف هذا الإجراء؟")) {
        let records = JSON.parse(localStorage.getItem("dashboard_records")) || [];
        records = records.filter(r => r.id !== id);
        localStorage.setItem("dashboard_records", JSON.stringify(records));
        renderDashboardTable();
      }
    }
  </script>
</body>
</html>
