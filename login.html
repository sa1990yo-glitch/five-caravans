<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<script>
  // إذا كان مسجلاً دخوله سابقاً، يفتح له الموقع مباشرة دون الحاجة لصفحة الدخول
  if (localStorage.getItem('isLoggedIn') === 'true') {
    window.location.href = "index.html";
  }
</script>

  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - القوافل الخمسة</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Almarai:wght=400;700&display=swap');
    body { font-family: 'Almarai', sans-serif; }
  </style>
  <script>
    // 💡 ميزة ذكية: إذا كان المستخدم مسجلاً دخوله بالفعل، وجهه فوراً إلى لوحة التحكم
    if (localStorage.getItem('isLoggedIn') === 'true') {
      window.location.href = "index.html";
    }
  </script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen px-4">

  <div class="bg-white rounded-2xl shadow-xl border border-gray-200 w-full max-w-md p-8 relative overflow-hidden">
    <div class="absolute top-0 left-0 right-0 h-2 bg-[#0c2d6e]"></div>

    <div class="text-center mb-8">
      <div class="text-4xl mb-2">🚚</div>
      <h2 class="text-2xl font-bold text-[#0c2d6e]">مؤسسة القوافل الخمسة</h2>
      <p class="text-gray-500 text-sm mt-1">نظام إدارة الموارد البشرية واللوجستية</p>
    </div>

    <div id="error-message" class="hidden p-3 mb-4 text-sm text-red-700 bg-red-100 border border-red-200 rounded-xl text-center font-bold">
      ❌ اسم المستخدم أو كلمة المرور غير صحيحة!
    </div>

    <form id="login-form" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">اسم المستخدم</label>
        <input type="text" id="username" required placeholder="أدخل اسم المستخدم"
               class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#0c2d6e] focus:border-[#0c2d6e] outline-none text-right transition-all">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">كلمة المرور</label>
        <input type="password" id="password" required placeholder="••••••••"
               class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#0c2d6e] focus:border-[#0c2d6e] outline-none text-left transition-all" dir="ltr">
      </div>

      <button type="submit" 
              class="w-full bg-[#0c2d6e] hover:bg-[#092252] text-white font-bold py-3 px-4 rounded-xl shadow-md transition-all duration-200 transform active:scale-95">
        تسجيل الدخول 🔐
      </button>
    </form>

    <div class="mt-8 text-center text-xs text-gray-400">
      جميع الحقوق محفوظة © ابو رنون للبرمجيات 2026
    </div>
  </div>

  <script>
    const loginForm = document.getElementById('login-form');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const errorDiv = document.getElementById('error-message');

    // إخفاء رسالة الخطأ تلقائياً عند البدء بالكتابة مجدداً
    usernameInput.addEventListener('input', () => errorDiv.classList.add('hidden'));
    passwordInput.addEventListener('input', () => errorDiv.classList.add('hidden'));

    loginForm.addEventListener('submit', function(e) {
      e.preventDefault(); // منع إعادة تحميل الصفحة
      
      const user = usernameInput.value.trim();
      const pass = passwordInput.value;

      // 🔴 يمكنك تعديل اسم المستخدم وكلمة المرور من هنا كما تحب:
      if (user === "admin" && pass === "123456") {
        // حفظ جلسة الدخول في المتصفح لكي يفتح الموقع
        localStorage.setItem('isLoggedIn', 'true');
        // الانتقال فوراً إلى لوحة التحكم الرئيسية
        window.location.href = "index.html";
      } else {
        // إظهار رسالة الخطأ إذا كانت البيانات خاطئة
        errorDiv.classList.remove('hidden');
      }
    });
  </script>

</body>
</html>
