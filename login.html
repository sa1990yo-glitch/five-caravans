<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - القوافل الخمسة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght=300;400;600;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

    <div class="absolute w-[500px] h-[500px] rounded-full bg-blue-600/10 blur-[120px] -top-40 -right-40 z-0"></div>
    <div class="absolute w-[500px] h-[500px] rounded-full bg-indigo-600/10 blur-[120px] -bottom-40 -left-40 z-0"></div>

    <div class="w-full max-w-md bg-slate-900 border border-slate-800 p-8 rounded-3xl shadow-2xl z-10">
        
        <div class="flex flex-col items-center text-center mb-8">
            <div class="w-16 h-16 rounded-2xl bg-blue-600/10 border border-blue-500/20 flex items-center justify-center text-3xl mb-4 shadow-inner">
                🚚
            </div>
            <h1 class="text-2xl font-black text-white">مؤسسة القوافل الخمسة</h1>
            <p class="text-xs text-slate-400 mt-1">للخدمات اللوجستية والـنـقـل</p>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-6">
            <div>
                <label for="passcode" class="block text-xs font-bold text-slate-400 mb-2 mr-1">رمز الدخول الخاص بالإدارة</label>
                <div class="relative">
                    <span class="absolute inset-y-0 right-0 flex items-center pr-4 text-slate-500">
                        <i class="fa-solid fa-lock text-sm"></i>
                    </span>
                    <input 
                        type="password" 
                        id="passcode" 
                        placeholder="••••" 
                        required
                        class="w-full bg-slate-950/60 border border-slate-800 text-white rounded-2xl py-3.5 pr-11 pl-4 text-center font-mono text-xl tracking-[0.5em] focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all placeholder:tracking-normal placeholder:text-sm"
                    >
                </div>
                <p id="error-msg" class="text-xs text-rose-500 font-bold mt-2.5 mr-1 hidden flex items-center gap-1.5">
                    <i class="fa-solid fa-circle-exclamation"></i> الرمز الذي أدخلته غير صحيح، يرجى المحاولة مجدداً.
                </p>
            </div>

            <button 
                type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-500 active:scale-[0.98] text-white font-bold py-3.5 rounded-2xl shadow-lg shadow-blue-600/20 transition-all flex items-center justify-center gap-2 text-sm"
            >
                <span>دخول للوحة التحكم</span>
                <i class="fa-solid fa-chevron-left text-xs"></i>
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-slate-800/60 text-center">
            <span class="text-[10px] text-slate-500 font-medium">نظام الإدارة الداخلي الموحد © 2026</span>
        </div>
    </div>

    <script>
        // 🔒 الرمز الافتراضي للدخول (تقدر تعدله من هنا لأي رمز تبغاه)
        const SECRET_PASSCODE = "5555"; 

        // التحقق إذا كان مسجل دخول بالفعل، ينقله تلقائياً للرئيسية
        if (localStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = "index.html";
        }

        function handleLogin(e) {
            e.preventDefault();
            
            const inputVal = document.getElementById('passcode').value;
            const errorMsg = document.getElementById('error-msg');

            // التحقق من صحة الرمز
            if (inputVal === SECRET_PASSCODE) {
                // حفظ حالة تسجيل الدخول في المتصفح
                localStorage.setItem('isLoggedIn', 'true');
                // التوجيه فوراً للوحة التحكم
                window.location.href = "index.html";
            } else {
                // إظهار رسالة الخطأ وتفريغ الحقل
                errorMsg.classList.remove('hidden');
                document.getElementById('passcode').value = '';
                document.getElementById('passcode').focus();
            }
        }
    </script>
</body>
</html>
